name: Node.js CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
            
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Use the Node.js version you need
          cache: 'yarn' # Automatically cache Yarn dependencies

      - name: Install dependencies
        run: yarn install --immutable && yarn tsc && yarn build:backend

#      - name: Build the Docker image
#        run: |
#          docker image build . -f packages/backend/Dockerfile --tag goafabric/backstage:1.0.1-SNAPSHOT && docker push goafabric/backstage:1.0.1-SNAPSHOT

      # Step 3: Build and push the Docker image using Kaniko
      - name: Build and Push Docker Image with Kaniko
        uses: gcr.io/kaniko-project/executor:latest
#        env:
#          DOCKER_CONFIG: /kaniko/.docker/
        with:
          args: >
            --context=dir://$(pwd)  # Path to Docker build context (current directory)
            --dockerfile=$(pwd)/packages/backend/Dockerfile  # Path to Dockerfile
            --destination=docker.io/goafabric/backstage:1.0.1-SNAPSHOT  # Image destination
            --oci-layout-path=/kaniko/output